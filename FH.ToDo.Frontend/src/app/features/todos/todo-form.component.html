<div class="form-row">
  <mat-form-field appearance="outline" style="flex:1; margin-bottom:-1.25em">
    <mat-label>Add a task</mat-label>
    <input
      matInput
      [value]="title()"
      (input)="title.set($any($event.target).value)"
      (keyup.enter)="submit()"
      [disabled]="isSubmitting()"
    />
    <mat-icon matSuffix>add_task</mat-icon>
  </mat-form-field>
  <button mat-flat-button (click)="submit()" [disabled]="isSubmitting() || !title().trim()">
    Add
  </button>
</div>
