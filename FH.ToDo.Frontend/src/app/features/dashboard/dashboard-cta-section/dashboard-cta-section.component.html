<section class="cta">
  <div class="container">
    <h2>Ready to get organised?</h2>
    <p>Start managing your tasks for free. Register in seconds and upgrade to Premium whenever you need unlimited tasks and priority features.</p>
    <div class="actions">
      <a mat-flat-button (click)="authDialogService.openRegister()">Get started free</a>
      <a mat-stroked-button (click)="authDialogService.openLogin()">
        <mat-icon>login</mat-icon>
        Sign in
      </a>
    </div>
  </div>
</section>
